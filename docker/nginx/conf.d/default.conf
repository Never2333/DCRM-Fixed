upstream django {
    server dcrm-app:8001;  # match your python3 configuration
}
server {
    listen       80;
    server_name  localhost;  # your domain here
    client_max_body_size 128M;  # maximum upload size

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        rewrite ^ /index/ last;
    }

    location / {
        try_files $uri $uri/ @djangosite;
    }
    
    location ~^/((InRelease)|(Release(.gpg)?)|(Packages(.gz|.bz2|.xz)?))$ {
        alias /usr/share/nginx/html/resources/releases/1/$1;  # match the active Release id in DCRM settings
        expires off;
        add_header Cache-Control "public, no-cache, max-age=0, s-maxage=0, must-revalidate, proxy-revalidate, no-transform" always;
        add_header CDN-Cache-Control "no-cache, max-age=0" always;
        add_header Cloudflare-CDN-Cache-Control "no-cache, max-age=0" always;
        add_header X-Content-Type-Options "nosniff" always;
        etag on;
    }

    location = /CydiaIcon.png {
        alias /usr/share/nginx/html/resources/releases/1/CydiaIcon.png;  # match the active Release id in DCRM settings
        expires 7d;
        add_header Cache-Control "public, max-age=604800, no-transform" always;
    }
    
    location ~* .(ico|gif|jpg|jpeg|png|js|css)$ {
        expires 7d;
    }

    location @djangosite {
        uwsgi_pass django;
        include /etc/nginx/uwsgi_params;
    }
}
